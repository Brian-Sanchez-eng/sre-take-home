name: deploy

# On merge to main: build/test, publish image + NuGet, deploy to development,
# then promote the same build to test.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

permissions:
  contents: read

env:
  BUILD_CONFIGURATION: Release
  IMAGE: ghcr.io/brian-sanchez-eng/sre-take-home/candidate-api

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-
      - run: dotnet restore SreTakeHome.sln
      - run: dotnet build SreTakeHome.sln -c "$BUILD_CONFIGURATION" --no-restore
      - run: dotnet test SreTakeHome.sln -c "$BUILD_CONFIGURATION" --no-build

  build-push-image:
    needs: build-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Compute tag
        id: meta
        run: echo "tag=sha-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE }}:latest
          build-args: |
            VERSION=1.0.${{ github.run_number }}
            REVISION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-nuget:
    needs: build-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Pack contracts
        run: >-
          dotnet pack src/CandidateApi.Contracts/CandidateApi.Contracts.csproj
          -c "$BUILD_CONFIGURATION"
          -p:Version=1.0.${{ github.run_number }}
          -o artifacts/nuget
      - name: Push to GitHub Packages
        run: |
          dotnet nuget add source \
            --username ${{ github.actor }} \
            --password ${{ secrets.GITHUB_TOKEN }} \
            --store-password-in-clear-text \
            --name github "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
          dotnet nuget push "artifacts/nuget/*.nupkg" --source github \
            --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate

  deploy-dev:
    needs: build-push-image
    runs-on: ubuntu-latest
    environment: development
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
      - name: Install kustomize
        run: |
          curl -sLo /tmp/kustomize.tar.gz \
            https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.5.0/kustomize_v5.5.0_linux_amd64.tar.gz
          tar -xzf /tmp/kustomize.tar.gz -C /tmp
          sudo install /tmp/kustomize /usr/local/bin/kustomize
      - name: Pin image tag
        run: |
          cd k8s/overlays/development
          kustomize edit set image "${IMAGE}=${IMAGE}:${{ needs.build-push-image.outputs.tag }}"
      - name: Configure kubeconfig
        id: kube
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG_DEV }}
        run: |
          if [ -n "$KUBE_CONFIG" ]; then
            mkdir -p "$HOME/.kube"
            printf '%s' "$KUBE_CONFIG" | base64 -d > "$HOME/.kube/config"
            echo "live=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::No KUBE_CONFIG_DEV secret — rendering manifests in dry-run mode."
            echo "live=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Deploy
        run: |
          if [ "${{ steps.kube.outputs.live }}" = "true" ]; then
            kubectl apply -k k8s/overlays/development
            kubectl -n candidate-api-dev rollout status deploy/candidate-api --timeout=180s
          else
            echo "Rendered manifests (dry-run):"
            kustomize build k8s/overlays/development
          fi
      - name: Smoke test
        if: steps.kube.outputs.live == 'true'
        run: |
          kubectl -n candidate-api-dev port-forward svc/candidate-api 18080:80 >/dev/null 2>&1 &
          sleep 4
          curl -fsS http://127.0.0.1:18080/health/ready

  deploy-test:
    needs: [build-push-image, deploy-dev]
    runs-on: ubuntu-latest
    environment: test
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
      - name: Install kustomize
        run: |
          curl -sLo /tmp/kustomize.tar.gz \
            https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.5.0/kustomize_v5.5.0_linux_amd64.tar.gz
          tar -xzf /tmp/kustomize.tar.gz -C /tmp
          sudo install /tmp/kustomize /usr/local/bin/kustomize
      - name: Pin image tag
        run: |
          cd k8s/overlays/test
          kustomize edit set image "${IMAGE}=${IMAGE}:${{ needs.build-push-image.outputs.tag }}"
      - name: Configure kubeconfig
        id: kube
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG_TEST }}
        run: |
          if [ -n "$KUBE_CONFIG" ]; then
            mkdir -p "$HOME/.kube"
            printf '%s' "$KUBE_CONFIG" | base64 -d > "$HOME/.kube/config"
            echo "live=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::No KUBE_CONFIG_TEST secret — rendering manifests in dry-run mode."
            echo "live=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Deploy
        run: |
          if [ "${{ steps.kube.outputs.live }}" = "true" ]; then
            kubectl apply -k k8s/overlays/test
            kubectl -n candidate-api-test rollout status deploy/candidate-api --timeout=180s
          else
            echo "Rendered manifests (dry-run):"
            kustomize build k8s/overlays/test
          fi
      - name: Smoke test
        if: steps.kube.outputs.live == 'true'
        run: |
          kubectl -n candidate-api-test port-forward svc/candidate-api 18080:80 >/dev/null 2>&1 &
          sleep 4
          curl -fsS http://127.0.0.1:18080/health/ready

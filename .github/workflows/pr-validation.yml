name: pr-validation

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BUILD_CONFIGURATION: Release

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore SreTakeHome.sln

      - name: Build
        run: dotnet build SreTakeHome.sln -c "$BUILD_CONFIGURATION" --no-restore

      - name: Test
        run: >-
          dotnet test SreTakeHome.sln
          -c "$BUILD_CONFIGURATION"
          --no-build
          --logger "trx;LogFileName=test-results.trx"
          --results-directory TestResults

      - name: Publish test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/*.trx
          if-no-files-found: warn

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      # PR builds get a prerelease version so they never collide with releases.
      - name: Pack contracts
        run: >-
          dotnet pack src/CandidateApi.Contracts/CandidateApi.Contracts.csproj
          -c "$BUILD_CONFIGURATION"
          -p:Version=1.0.0-pr.${{ github.event.pull_request.number }}.${{ github.run_number }}
          -o artifacts/nuget

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: artifacts/nuget/*.nupkg

  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: candidate-api:pr-${{ github.run_number }}
          build-args: |
            VERSION=0.0.0-pr.${{ github.run_number }}
            REVISION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Self-contained gate: fail the PR on fixable CRITICAL/HIGH CVEs.
      - name: Scan image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: candidate-api:pr-${{ github.run_number }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: candidate-api
  labels:
    app.kubernetes.io/name: candidate-api
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: candidate-api
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - podSelector: {}
      ports:
        - port: 8080
          protocol: TCP
  egress:
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Outbound to declared dependencies (db/cache/https). Narrow per-env in prod.
    - ports:
        - port: 5432
          protocol: TCP
        - port: 6379
          protocol: TCP
        - port: 443
          protocol: TCP

apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: candidate-api-canary-health
  labels:
    app.kubernetes.io/name: candidate-api
spec:
  args:
    - name: ingress
    - name: namespace
  metrics:
    # Abort if canary success rate drops below the SLO target.
    - name: success-rate
      interval: 30s
      count: 5
      successCondition: "len(result) == 0 || result[0] >= 0.99"
      failureLimit: 1
      provider:
        prometheus:
          address: http://prometheus-operated.monitoring.svc:9090
          query: |
            sum(rate(nginx_ingress_controller_requests{
              exported_namespace="{{args.namespace}}",
              ingress="{{args.ingress}}", status!~"5.."}[2m]))
            /
            sum(rate(nginx_ingress_controller_requests{
              exported_namespace="{{args.namespace}}",
              ingress="{{args.ingress}}"}[2m]))
    # Abort if p95 latency regresses past 500ms.
    - name: latency-p95
      interval: 30s
      count: 5
      successCondition: "len(result) == 0 || result[0] <= 0.5"
      failureLimit: 1
      provider:
        prometheus:
          address: http://prometheus-operated.monitoring.svc:9090
          query: |
            histogram_quantile(0.95, sum(rate(
              nginx_ingress_controller_request_duration_seconds_bucket{
                exported_namespace="{{args.namespace}}",
                ingress="{{args.ingress}}"}[2m])) by (le))

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: candidate-api
  labels:
    app.kubernetes.io/name: candidate-api
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: candidate-api.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: candidate-api-stable
                port:
                  number: 80

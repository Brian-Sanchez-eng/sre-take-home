apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: candidate-api-readiness
  labels:
    app.kubernetes.io/name: candidate-api
    release: kube-prometheus-stack
spec:
  interval: 30s
  module: http_2xx
  prober:
    url: blackbox-exporter.monitoring.svc:9115
  targets:
    staticConfig:
      static:
        - http://candidate-api.candidate-api-dev.svc.cluster.local/health/ready
        - http://candidate-api.candidate-api-test.svc.cluster.local/health/ready
      labels:
        service: candidate-api
